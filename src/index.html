                { word: "glove", meaning: "手套", phonetic: "/ɡlʌv/", sentence: "Wear gloves in winter." },
                { word: "scarf", meaning: "围巾", phonetic: "/skɑːf/", sentence: "The scarf keeps me warm." },
                { word: "umbrella", meaning: "雨伞", phonetic: "/ʌmˈbrelə/", sentence: "Don't forget your umbrella." },
                { word: "sunglasses", meaning: "太阳镜", phonetic: "/ˈsʌnɡlɑːsɪz/", sentence: "Put on sunglasses on sunny days." },
                { word: "pretty", meaning: "漂亮的", phonetic: "/ˈprɪti/", sentence: "The dress is pretty." },
                { word: "expensive", meaning: "昂贵的", phonetic: "/ɪkˈspensɪv/", sentence: "This watch is expensive." },
                { word: "cheap", meaning: "便宜的", phonetic: "/tʃiːp/", sentence: "The toy is cheap." },
                { word: "nice", meaning: "好看的", phonetic: "/naɪs/", sentence: "You look nice today." }
            ]
        }
    };

    // 发音函数
    function speakWord(word) {
        if (!window.speechSynthesis) return alert("浏览器不支持语音朗读");
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
    }

    // 全局变量
    let currentSemester = "up";
    let currentUnit = "";
    let quizWordsList = [];         // 当前单元单词 {word, meaning}
    let currentQuizIndex = 0;
    let quizActive = false;          // 练习面板是否打开

    // DOM 元素
    const unitNavDiv = document.getElementById("unitNav");
    const vocabGridDiv = document.getElementById("vocabGrid");
    const exercisePanel = document.getElementById("exercisePanel");
    const spellInput = document.getElementById("spellInput");
    const checkBtn = document.getElementById("checkBtn");
    const nextWordBtn = document.getElementById("nextWordBtn");
    const feedbackDiv = document.getElementById("feedbackMsg");
    const chineseHintSpan = document.getElementById("chineseHint");
    const quizProgressSpan = document.getElementById("quizProgress");
    const closeQuizBtn = document.getElementById("closeQuizBtn");

    // 辅助函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 获取当前单元所有单词 (用于展示&练习)
    function getCurrentWordList() {
        if (!vocabulary[currentSemester] || !vocabulary[currentSemester][currentUnit]) return [];
        return vocabulary[currentSemester][currentUnit];
    }

    // 渲染单词卡片
    function renderVocabGrid() {
        const words = getCurrentWordList();
        if (!words.length) {
            vocabGridDiv.innerHTML = '<div class="empty-msg">✨ 暂无单词，请选择其他单元 ✨</div>';
            return;
        }
        let html = '';
        words.forEach(item => {
            html += `
                <div class="word-card">
                    <div class="word-header">
                        <span class="word-en">${escapeHtml(item.word)}</span>
                        <span class="word-zh">📌 ${escapeHtml(item.meaning)}</span>
                    </div>
                    ${item.phonetic ? `<div class="phonetic">🔊 ${escapeHtml(item.phonetic)}</div>` : ''}
                    <div class="sentence"><i>📖 例句：</i> ${escapeHtml(item.sentence)}</div>
                    <button class="sound-btn" data-word="${escapeHtml(item.word)}">🎵 标准发音</button>
                </div>
            `;
        });
        vocabGridDiv.innerHTML = html;
        document.querySelectorAll('.sound-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const w = btn.getAttribute('data-word');
                if (w) speakWord(w);
            });
        });
    }

    // 渲染单元导航并添加练习入口
    function renderUnitNav() {
        const units = Object.keys(vocabulary[currentSemester]);
        if (!units.length) return;
        let navHtml = "";
        units.forEach(unit => {
            const activeClass = (currentUnit === unit) ? 'active' : '';
            navHtml += `<div class="unit-chip ${activeClass}" data-unit="${escapeHtml(unit)}">📖 ${escapeHtml(unit)}</div>`;
        });
        unitNavDiv.innerHTML = navHtml;
        document.querySelectorAll('.unit-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                currentUnit = chip.getAttribute('data-unit');
                renderUnitNav();
                renderVocabGrid();
                // 切换单元后自动关闭练习面板
                if (quizActive) closeExercisePanel();
            });
        });
        // 在单词网格上方增加练习按钮（每次刷新网格时动态添加操作栏）
        const actionBar = document.createElement('div');
        actionBar.className = 'action-bar';
        actionBar.innerHTML = `<button id="startQuizBtn" class="quiz-btn">📝 单元练习 (拼写闯关)</button>`;
        const existingBar = document.querySelector('.action-bar');
        if (existingBar) existingBar.remove();
        vocabGridDiv.parentNode.insertBefore(actionBar, vocabGridDiv);
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            startQuizForCurrentUnit();
        });
    }

    // 开始练习
    function startQuizForCurrentUnit() {
        const words = getCurrentWordList();
        if (!words.length) {
            alert("当前单元没有单词，无法练习~");
            return;
        }
        quizWordsList = words.map(w => ({ word: w.word, meaning: w.meaning }));
        currentQuizIndex = 0;
        quizActive = true;
        exercisePanel.style.display = 'block';
        loadQuizWord();
        // 重置按钮状态
        nextWordBtn.disabled = true;
        spellInput.value = '';
        feedbackDiv.innerHTML = "🌟 开始挑战！根据中文拼写英文单词～";
        spellInput.focus();
    }

    function loadQuizWord() {
        if (!quizActive || currentQuizIndex >= quizWordsList.length) {
            // 练习完成
            feedbackDiv.innerHTML = `🎉🎉 恭喜你完成了「${currentUnit}」所有单词的拼写练习！ 🎉🎉<br> 你太厉害了！坚持复习会更棒哦～`;
            nextWordBtn.disabled = true;
            checkBtn.disabled = true;
            spellInput.disabled = true;
            chineseHintSpan.innerText = "完成啦 ✨";
            quizProgressSpan.innerText = `完成 ${quizWordsList.length}/${quizWordsList.length} 词`;
            return;
        }
        const current = quizWordsList[currentQuizIndex];
        chineseHintSpan.innerText = current.meaning;
        quizProgressSpan.innerText = `第 ${currentQuizIndex+1} / ${quizWordsList.length} 词`;
        spellInput.disabled = false;
        checkBtn.disabled = false;
        nextWordBtn.disabled = true;    // 需要检查正确后才可下一题
        spellInput.value = '';
        feedbackDiv.innerHTML = "📝 输入单词，点击「检查」看看对错吧！";
        spellInput.focus();
    }

    // 检查拼写
    function checkSpelling() {
        if (!quizActive) return;
        if (currentQuizIndex >= quizWordsList.length) {
            feedbackDiv.innerHTML = "练习已经完成！关闭面板后可以选择其他单元～";
            return;
        }
        const userAnswer = spellInput.value.trim().toLowerCase();
        const correctWord = quizWordsList[currentQuizIndex].word.toLowerCase();
        if (userAnswer === correctWord) {
            // 拼写正确：表扬
            feedbackDiv.innerHTML = `🎉 拼写正确！太棒了！ “${quizWordsList[currentQuizIndex].word}” 完全正确！ 🎉<br>👍 真厉害，继续加油～`;
            // 正确后启用下一词按钮
            nextWordBtn.disabled = false;
            checkBtn.disabled = true;   // 防止重复检查
        } else {
            // 拼错：提示“再想想”并且给出正确答案
            feedbackDiv.innerHTML = `🤔 再想想～ 正确答案是：<strong style="color:#D9792B;">${quizWordsList[currentQuizIndex].word}</strong><br> 💪 记住正确拼写，下一词会更好！`;
            nextWordBtn.disabled = false;   // 允许继续下一题 (已给出正确答案)
            checkBtn.disabled = true;
        }
    }

    function nextWord() {
        if (!quizActive) return;
        if (currentQuizIndex < quizWordsList.length) {
            currentQuizIndex++;
            loadQuizWord();
            // 重置检查按钮可用性
            checkBtn.disabled = false;
            nextWordBtn.disabled = true;
            spellInput.disabled = false;
        } else {
            // 已完成
            loadQuizWord(); // 触发完成界面
        }
    }

    function closeExercisePanel() {
        exercisePanel.style.display = 'none';
        quizActive = false;
        spellInput.disabled = false;
        checkBtn.disabled = false;
        nextWordBtn.disabled = true;
        feedbackDiv.innerHTML = "✨ 点击「单元练习」再挑战吧！";
    }

    // 学期切换
    function switchSemester(semester) {
        currentSemester = semester;
        const units = Object.keys(vocabulary[currentSemester]);
        currentUnit = units.length ? units[0] : "";
        renderUnitNav();
        renderVocabGrid();
        closeExercisePanel();
    }

    // 绑定事件与初始化
    function init() {
        const semBtns = document.querySelectorAll('.sem-btn');
        semBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                semBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const sem = btn.getAttribute('data-sem');
                if (sem === 'up') switchSemester('up');
                else switchSemester('down');
            });
        });
        switchSemester('up');

        checkBtn.addEventListener('click', checkSpelling);
        nextWordBtn.addEventListener('click', nextWord);
        closeQuizBtn.addEventListener('click', closeExercisePanel);
        // 按回车也可以检查
        spellInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && checkBtn.disabled === false) checkSpelling();
        });
    }

    init();
</script>
</body>
</html>
